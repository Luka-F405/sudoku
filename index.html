<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>数独ソルバー</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 20px;
  }

  table { border-collapse: collapse; margin: auto; }

  td { width: 40px; height: 40px; }

  input {
    width: 38px;
    height: 38px;
    text-align: center;
    font-size: 18px;
    border: 1px solid #999;
  }

  .right-border { border-right: 3px solid black; }
  .bottom-border { border-bottom: 3px solid black; }

  button {
    margin: 6px;
    padding: 8px 14px;
    font-size: 15px;
  }

  .error { background-color: #ffb3b3; }
</style>
</head>
<body>

<h2>数独ソルバー</h2>

<table id="board"></table>

<br>

<button onclick="confirmInput()">問題入力完了 ※入力後に押してください</button>
<button onclick="solveSudoku()">解答</button>
<button onclick="restoreBoard()">戻る</button>
<button onclick="clearBoard()">クリア</button>

<script>
const SIZE = 9;
let boardEl = document.getElementById("board");
let initialBoard = null;
let solvedBoard = null;

function createBoard() {
  for (let i = 0; i < SIZE; i++) {
    let row = document.createElement("tr");

    for (let j = 0; j < SIZE; j++) {
      let cell = document.createElement("td");
      let input = document.createElement("input");

      input.maxLength = 1;

      input.addEventListener("input", () => {
        input.value = input.value.replace(/[^1-9]/g, "");
        validateBoard();
      });

      cell.appendChild(input);

      if ((j + 1) % 3 === 0 && j !== 8) cell.classList.add("right-border");
      if ((i + 1) % 3 === 0 && i !== 8) cell.classList.add("bottom-border");

      row.appendChild(cell);
    }

    boardEl.appendChild(row);
  }
}

createBoard();

function getBoard() {
  let board = [];
  for (let i = 0; i < SIZE; i++) {
    let row = [];
    let inputs = boardEl.rows[i].getElementsByTagName("input");

    for (let j = 0; j < SIZE; j++) {
      let v = inputs[j].value;
      row.push(v === "" ? 0 : parseInt(v));
    }
    board.push(row);
  }
  return board;
}

function setBoard(board) {
  for (let i = 0; i < SIZE; i++) {
    let inputs = boardEl.rows[i].getElementsByTagName("input");
    for (let j = 0; j < SIZE; j++) {
      inputs[j].value = board[i][j] === 0 ? "" : board[i][j];
    }
  }
}

function validateBoard() {
  let board = getBoard();

  for (let i = 0; i < SIZE; i++) {
    for (let j = 0; j < SIZE; j++) {
      let input = boardEl.rows[i].cells[j].firstChild;
      input.classList.remove("error");

      let val = board[i][j];
      if (val === 0) continue;

      board[i][j] = 0;

      if (!isValid(board, i, j, val)) {
        input.classList.add("error");
      }

      board[i][j] = val;
    }
  }
}

function isValid(board, row, col, num) {
  for (let i = 0; i < SIZE; i++) {
    if (board[row][i] === num || board[i][col] === num) return false;
  }

  let sr = Math.floor(row / 3) * 3;
  let sc = Math.floor(col / 3) * 3;

  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      if (board[sr + i][sc + j] === num) return false;
    }
  }

  return true;
}

function solve(board) {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] === 0) {
        for (let n = 1; n <= 9; n++) {
          if (isValid(board, r, c, n)) {
            board[r][c] = n;
            if (solve(board)) return true;
            board[r][c] = 0;
          }
        }
        return false;
      }
    }
  }
  return true;
}

function confirmInput() {
  initialBoard = getBoard();
  alert("問題を入力完了しました");
}

function solveSudoku() {
  let board = initialBoard ? JSON.parse(JSON.stringify(initialBoard)) : getBoard();

  if (solve(board)) {
    solvedBoard = board;
    setBoard(board);
  } else {
    alert("解が見つかりませんでした");
  }
}

function restoreBoard() {
  if (initialBoard) {
    setBoard(initialBoard);
  } else {
    alert("まだ問題が確定されていません");
  }
}

function clearBoard() {
  let inputs = document.getElementsByTagName("input");
  for (let i of inputs) {
    i.value = "";
    i.classList.remove("error");
  }
  initialBoard = null;
  solvedBoard = null;
}

</script>

</body>
</h
